pre-commit:
  parallel: true
  commands:
    lint:
      glob: "*.{ts,json}"
      run: bunx biome check --no-errors-on-unmatched {staged_files}
    secrets:
      run: gitleaks git --staged --no-banner

pre-push:
  parallel: true
  commands:
    typecheck:
      run: bun run typecheck
    test:
      run: bun run test
